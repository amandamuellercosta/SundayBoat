<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crew Assignment</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a18;
  --paper:#f5f0e8;
  --paper2:#ede8dc;
  --accent:#2a4a7f;
  --accent-light:#e8eef5;
  --warn:#b5421a;
  --warn-light:#faeee8;
  --success:#2d6a3f;
  --success-light:#eaf5ee;
  --border:#c8c0b0;
  --muted:#7a7468;
}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  padding:0 0 80px;
}
/* IDENTITY SCREEN */
#identity-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem;text-align:center;
}
#identity-screen h1{
  font-family:'Libre Baskerville',serif;
  font-size:28px;margin-bottom:8px;
}
#identity-screen p{font-size:14px;color:var(--muted);margin-bottom:2rem}
.identity-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}
.id-btn{
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  padding:14px 20px;border:1px solid var(--border);border-radius:10px;
  background:#fff;color:var(--ink);cursor:pointer;
  transition:background .12s,border-color .12s,transform .1s;
  text-align:left;display:flex;align-items:center;gap:10px;
}
.id-btn:hover{background:var(--paper2);border-color:#a0988a;transform:scale(1.01)}
.id-btn .id-avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;flex-shrink:0;
}
/* MAIN APP */
#app{display:none;flex-direction:column;min-height:100vh}
/* TOP BAR */
.topbar{
  background:#fff;border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.topbar-left h1{font-family:'Libre Baskerville',serif;font-size:18px}
.topbar-left p{font-size:11px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.me-badge{
  font-size:12px;font-weight:500;
  padding:5px 12px;border-radius:99px;
  border:1px solid var(--border);
  background:var(--paper2);color:var(--ink);
}
.share-btn{
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  padding:6px 14px;border:1px solid var(--accent);border-radius:99px;
  background:var(--accent);color:#fff;cursor:pointer;
}
/* CONTENT */
.content{padding:16px}
/* BOATS */
.boats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
@media(min-width:700px){.boats-grid{grid-template-columns:repeat(4,1fr)}}
.boat{
  background:#fff;border:1px solid var(--border);border-radius:10px;
  overflow:hidden;
}
.boat-head{
  padding:10px 12px 8px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.boat-head-name{font-family:'Libre Baskerville',serif;font-size:12px;font-weight:700;line-height:1.3}
.boat-head-cap{
  font-size:11px;padding:2px 7px;border-radius:99px;
  background:var(--paper2);border:1px solid var(--border);color:var(--muted);
  white-space:nowrap;
}
.boat-head-cap.full{background:var(--success-light);border-color:#a8d5b5;color:var(--success)}
.boat-head-cap.over{background:var(--warn-light);border-color:#e8b5a0;color:var(--warn)}
.boat-names{padding:8px;min-height:80px;display:flex;flex-direction:column;gap:4px}
.boat-empty{font-size:11px;color:var(--border);font-style:italic;padding:8px 4px}
/* PERSON CHIP IN BOAT */
.chip{
  background:var(--paper2);border:1px solid var(--border);
  border-radius:6px;padding:6px 8px;
  font-size:11px;color:var(--ink);line-height:1.3;
  position:relative;cursor:pointer;
  transition:background .1s;
}
.chip:hover{background:#e0dace;border-color:#a0988a}
.chip-name{font-weight:500}
.chip-by{font-size:10px;color:var(--muted);margin-top:1px;font-style:italic}
.chip-by .by-dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  margin-right:3px;vertical-align:middle;margin-top:-1px;
}
/* POOL */
.pool-section{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.pool-head{
  padding:10px 12px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.pool-head-title{font-size:13px;font-weight:500}
.pool-head-cnt{
  font-size:11px;padding:2px 8px;border-radius:99px;
  background:var(--paper2);border:1px solid var(--border);color:var(--muted);
}
.pool-grid{padding:8px;display:flex;flex-wrap:wrap;gap:5px}
.pool-chip{
  background:var(--accent-light);border:1px solid #b5c8e0;
  border-radius:6px;padding:7px 10px;
  font-size:12px;color:var(--ink);font-weight:500;
  cursor:pointer;transition:background .1s,transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.pool-chip:hover,.pool-chip:active{background:#d0dff0;border-color:#7a9fc8;transform:scale(0.97)}
.pool-empty{font-size:12px;color:var(--success);font-weight:500;padding:8px 4px}

/* ASSIGN MODAL */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.45);z-index:200;
  align-items:flex-end;justify-content:center;
}
#modal-overlay.open{display:flex}
.modal{
  background:#fff;border-radius:16px 16px 0 0;
  width:100%;max-width:480px;
  padding:20px 16px 32px;
  animation:slideUp .2s ease;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-family:'Libre Baskerville',serif;font-size:16px;margin-bottom:4px}
.modal p{font-size:13px;color:var(--muted);margin-bottom:16px}
.modal-boats{display:flex;flex-direction:column;gap:8px}
.modal-boat-btn{
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  padding:12px 16px;border:1px solid var(--border);border-radius:8px;
  background:var(--paper2);color:var(--ink);cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  transition:background .1s;-webkit-tap-highlight-color:transparent;
}
.modal-boat-btn:hover,.modal-boat-btn:active{background:#e0dace;border-color:#a0988a}
.modal-boat-btn.disabled{opacity:0.45;cursor:not-allowed;pointer-events:none}
.modal-boat-cap{font-size:12px;color:var(--muted)}
.modal-cancel{
  margin-top:12px;width:100%;padding:12px;
  border:1px solid var(--border);border-radius:8px;background:transparent;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;
}

/* CHANGELOG */
.changelog-toggle{
  margin:12px 0 0;font-size:12px;color:var(--accent);
  background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;
}
.changelog{display:none;margin-top:8px;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.changelog.open{display:block}
.changelog-head{padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.changelog-list{max-height:180px;overflow-y:auto}
.log-entry{padding:7px 12px;border-bottom:1px solid var(--border);font-size:12px;display:flex;gap:8px;align-items:flex-start}
.log-entry:last-child{border-bottom:none}
.log-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.log-text{color:var(--ink);line-height:1.4}
.log-time{font-size:10px;color:var(--muted);white-space:nowrap;margin-left:auto;padding-left:8px}

/* TOAST */
.toast{
  position:fixed;bottom:1.5rem;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--ink);color:#fff;
  font-size:13px;padding:9px 18px;border-radius:8px;
  opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;
  z-index:999;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- IDENTITY SCREEN -->
<div id="identity-screen">
  <h1>Crew Assignment</h1>
  <p>Who are you? Your name will appear on any changes you make.</p>
  <div class="identity-buttons">
    <button class="id-btn" onclick="setUser('nico','#2a4a7f')">
      <span class="id-avatar" style="background:#2a4a7f">N</span>
      Nico
    </button>
    <button class="id-btn" onclick="setUser('silvestre','#6b3a8f')">
      <span class="id-avatar" style="background:#6b3a8f">S</span>
      Silvestre
    </button>
    <button class="id-btn" onclick="setUser('luis','#2d6a3f')">
      <span class="id-avatar" style="background:#2d6a3f">L</span>
      Luis Herrera
    </button>
    <button class="id-btn" onclick="setUser('guest','#8a7060')" style="border-style:dashed">
      <span class="id-avatar" style="background:#8a7060">?</span>
      Just viewing
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Crew Assignment</h1>
      <p>Tap a name to assign it</p>
    </div>
    <div class="topbar-right">
      <span class="me-badge" id="me-badge"></span>
      <button class="share-btn" onclick="copyLink()">Share link</button>
    </div>
  </div>
  <div class="content">
    <div class="boats-grid" id="boats-grid"></div>
    <div class="pool-section">
      <div class="pool-head">
        <span class="pool-head-title">Unassigned</span>
        <span class="pool-head-cnt" id="pool-cnt">0</span>
      </div>
      <div class="pool-grid" id="pool-grid"></div>
    </div>
    <button class="changelog-toggle" onclick="toggleChangelog()">View change history</button>
    <div class="changelog" id="changelog">
      <div class="changelog-head">Change history</div>
      <div class="changelog-list" id="changelog-list"></div>
    </div>
  </div>
</div>

<!-- ASSIGN MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <h3 id="modal-name"></h3>
    <p>Which boat?</p>
    <div class="modal-boats" id="modal-boats"></div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PEOPLE = ["Amanda Mueller","Andres Ybarnegaray","Blas Peralta","Carlos Francisco Fernandez","Cecilia Aversa","Claudio Martinelli","Daniel Marx","Diego Merello","Federico Ferreyra","Gala Binga","German Ranftl","Guillermo Giordano","Javier Montanes","Jean Pierre Fort","Jose Luis Manzano","Juan Manuel Bastos","Luis Herrera","Marcelo Idoyaga","Maria Ines Anchelerguez","Maria Natalia Garcia","Marcelo Rufino","Martin Tempestti","Mateo Micucci","Mauricio Mazzon","Mercedes Demasi","Miguel Sanchez","Nicolas Mallo Huergo","Patricio Pagani","Pedro Mazer","Pilar Marco","Rahim Bapoo","Ricardo Carbajal","Ricardo Romero","Rodolfo Micone","Roma Renom","Ruben Liu","Santiago Durani","Santiago Gomez Barris","Savannah Ryan","Silvestre Schindler","Teresa Jordan","William Dunbar"];
const BOATS = [
  {id:"b0",name:"Dark Star of London",cap:11},
  {id:"b1",name:"Amuri",cap:12},
  {id:"b2",name:"Motor boat A",cap:12},
  {id:"b3",name:"Motor boat B",cap:12},
];
const USER_COLORS = {nico:"#2a4a7f",silvestre:"#6b3a8f",luis:"#2d6a3f",guest:"#8a7060"};
const USER_LABELS = {nico:"Nico",silvestre:"Silvestre",luis:"Luis Herrera",guest:"Guest"};

let me = null;
let state = null; // {boats:{b0:[{name,by}],...}, pool:[str], log:[{name,from,to,by,time}]}
let selectingName = null;

function defaultState(){
  const s={boats:{},pool:[...PEOPLE],log:[]};
  BOATS.forEach(b=>s.boats[b.id]=[]);
  return s;
}

// --- ENCODE / DECODE ---
function encode(s){ return btoa(unescape(encodeURIComponent(JSON.stringify(s)))); }
function decode(str){ try{ return JSON.parse(decodeURIComponent(escape(atob(str)))); }catch(e){ return null; } }

function saveToHash(){
  const p = new URLSearchParams(location.hash.slice(1));
  p.set("d", encode(state));
  history.replaceState(null,"","#"+p.toString());
}

function loadFromHash(){
  const p = new URLSearchParams(location.hash.slice(1));
  const raw = p.get("d");
  if(raw){ const d=decode(raw); if(d&&d.boats&&d.pool) return d; }
  return defaultState();
}

// --- USER ---
function setUser(user, color){
  me = user;
  document.getElementById("identity-screen").style.display="none";
  document.getElementById("app").style.display="flex";
  document.getElementById("me-badge").textContent = USER_LABELS[user];
  document.getElementById("me-badge").style.background = color+"22";
  document.getElementById("me-badge").style.borderColor = color+"66";
  render();
}

// --- RENDER ---
function render(){
  renderBoats();
  renderPool();
  renderChangelog();
}

function renderBoats(){
  const grid = document.getElementById("boats-grid");
  grid.innerHTML="";
  BOATS.forEach(b=>{
    const names = state.boats[b.id]||[];
    const div = document.createElement("div");
    div.className="boat";
    const capClass = names.length===b.cap?"full":names.length>b.cap?"over":"";
    div.innerHTML=`<div class="boat-head"><span class="boat-head-name">${b.name}</span><span class="boat-head-cap ${capClass}">${names.length}/${b.cap}</span></div><div class="boat-names" id="bn-${b.id}"></div>`;
    grid.appendChild(div);
    const bn = div.querySelector(".boat-names");
    if(names.length===0){
      bn.innerHTML='<div class="boat-empty">empty</div>';
    } else {
      names.forEach(entry=>{
        const chip = document.createElement("div");
        chip.className="chip";
        const byColor = USER_COLORS[entry.by]||"#8a7060";
        const byLabel = USER_LABELS[entry.by]||entry.by;
        const byPart = entry.by ? `<div class="chip-by"><span class="by-dot" style="background:${byColor}"></span>${byLabel}</div>` : "";
        chip.innerHTML=`<div class="chip-name">${entry.name}</div>${byPart}`;
        if(me!=="guest"){
          chip.onclick=()=>openModal(entry.name);
          chip.title="Tap to move";
        }
        bn.appendChild(chip);
      });
    }
  });
}

function renderPool(){
  const pg = document.getElementById("pool-grid");
  const cnt = document.getElementById("pool-cnt");
  pg.innerHTML="";
  cnt.textContent = state.pool.length;
  if(state.pool.length===0){
    pg.innerHTML='<div class="pool-empty">✓ Everyone assigned!</div>';
    return;
  }
  state.pool.forEach(name=>{
    const chip = document.createElement("div");
    chip.className="pool-chip";
    chip.textContent=name;
    if(me!=="guest") chip.onclick=()=>openModal(name);
    pg.appendChild(chip);
  });
}

function renderChangelog(){
  const list = document.getElementById("changelog-list");
  if(!state.log||state.log.length===0){
    list.innerHTML='<div style="padding:12px;font-size:12px;color:var(--muted);font-style:italic">No changes yet</div>';
    return;
  }
  list.innerHTML="";
  [...state.log].reverse().forEach(entry=>{
    const div=document.createElement("div");
    div.className="log-entry";
    const color=USER_COLORS[entry.by]||"#8a7060";
    const byLabel=USER_LABELS[entry.by]||entry.by;
    const fromLabel = entry.from==="pool"?"unassigned":boatName(entry.from);
    const toLabel = entry.to==="pool"?"unassigned":boatName(entry.to);
    const t = new Date(entry.time);
    const timeStr = t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    div.innerHTML=`<span class="log-dot" style="background:${color}"></span><span class="log-text"><b>${entry.name}</b> moved from <i>${fromLabel}</i> to <i>${toLabel}</i> by ${byLabel}</span><span class="log-time">${timeStr}</span>`;
    list.appendChild(div);
  });
}

function boatName(id){ const b=BOATS.find(x=>x.id===id); return b?b.name:id; }

// --- MODAL ---
function openModal(name){
  if(me==="guest") return;
  selectingName = name;
  document.getElementById("modal-name").textContent = name;
  const mb = document.getElementById("modal-boats");
  mb.innerHTML="";

  // find where this name currently is
  let currentBoat = "pool";
  BOATS.forEach(b=>{ if((state.boats[b.id]||[]).find(e=>e.name===name)) currentBoat=b.id; });

  BOATS.forEach(b=>{
    const btn=document.createElement("button");
    btn.className="modal-boat-btn";
    const names=state.boats[b.id]||[];
    const isCurrent = currentBoat===b.id;
    const isFull = names.length>=b.cap && !isCurrent;
    const capTxt = names.length+"/"+b.cap;
    btn.innerHTML=`<span>${b.name}${isCurrent?' <span style="font-size:11px;color:var(--muted)">(current)</span>':''}</span><span class="modal-boat-cap">${capTxt}</span>`;
    if(isFull) btn.classList.add("disabled");
    if(isCurrent) btn.style.background="var(--accent-light)";
    btn.onclick=()=>assignTo(name, currentBoat, b.id);
    mb.appendChild(btn);
  });

  // add "back to unassigned" if not already there
  if(currentBoat!=="pool"){
    const btn=document.createElement("button");
    btn.className="modal-boat-btn";
    btn.style.borderStyle="dashed";
    btn.innerHTML=`<span>↩ Move back to unassigned</span>`;
    btn.onclick=()=>assignTo(name, currentBoat, "pool");
    mb.appendChild(btn);
  }

  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal(e){
  if(e&&e.target!==document.getElementById("modal-overlay"))return;
  document.getElementById("modal-overlay").classList.remove("open");
  selectingName=null;
}

function assignTo(name, from, to){
  document.getElementById("modal-overlay").classList.remove("open");
  if(from===to) return;

  // remove from source
  if(from==="pool"){
    state.pool = state.pool.filter(n=>n!==name);
  } else {
    state.boats[from] = (state.boats[from]||[]).filter(e=>e.name!==name);
  }
  // add to dest
  if(to==="pool"){
    state.pool.push(name);
  } else {
    state.boats[to] = state.boats[to]||[];
    state.boats[to].push({name, by:me});
  }

  // log
  state.log = state.log||[];
  state.log.push({name, from, to, by:me, time:Date.now()});

  saveToHash();
  render();
  showToast(name+" → "+boatName(to));
}

function toggleChangelog(){
  const cl=document.getElementById("changelog");
  cl.classList.toggle("open");
}

function copyLink(){
  saveToHash();
  const url=location.href;
  navigator.clipboard.writeText(url).then(()=>showToast("Link copied! Share it.")).catch(()=>{ prompt("Copy this link:",url); });
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove("show"),2500);
}

// INIT
state = loadFromHash();
</script>
</body>
</html>
