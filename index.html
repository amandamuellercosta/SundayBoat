<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crew Assignment</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a18;--paper:#f5f0e8;--paper2:#ede8dc;
  --accent:#2a4a7f;--accent-light:#e8eef5;
  --warn:#b5421a;--warn-light:#faeee8;
  --success:#2d6a3f;--success-light:#eaf5ee;
  --border:#c8c0b0;--muted:#7a7468;
}
body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;padding:0 0 80px}
#identity-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
#identity-screen h1{font-family:'Libre Baskerville',serif;font-size:28px;margin-bottom:8px}
#identity-screen p{font-size:14px;color:var(--muted);margin-bottom:2rem}
.identity-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}
.id-btn{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;padding:14px 20px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--ink);cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px}
.id-btn:active{background:var(--paper2)}
.id-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-family:'Libre Baskerville',serif;font-size:18px}
.topbar p{font-size:11px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.me-badge{font-size:12px;font-weight:500;padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--paper2)}
.share-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border:1px solid var(--accent);border-radius:99px;background:var(--accent);color:#fff;cursor:pointer}
.content{padding:16px}
.main-layout{display:flex;flex-direction:column;gap:12px}
.section-box{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.section-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.section-title{font-size:13px;font-weight:500}
.section-cnt{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--paper2);border:1px solid var(--border);color:var(--muted)}
.drop-zone{padding:10px;min-height:60px;display:flex;flex-wrap:wrap;gap:6px;transition:background .15s}
.drop-zone.over{background:var(--accent-light)}
.boats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:700px){.boats-grid{grid-template-columns:repeat(4,1fr)}}
.boat{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.boat.over{border-color:var(--accent);box-shadow:0 0 0 3px rgba(42,74,127,0.12)}
.boat-head{padding:10px 12px 8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.boat-name{font-family:'Libre Baskerville',serif;font-size:12px;font-weight:700;line-height:1.3}
.cap-badge{font-size:11px;padding:2px 7px;border-radius:99px;background:var(--paper2);border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.cap-badge.full{background:var(--success-light);border-color:#a8d5b5;color:var(--success)}
.cap-badge.over{background:var(--warn-light);border-color:#e8b5a0;color:var(--warn)}
.boat-drop{padding:8px;min-height:90px;display:flex;flex-direction:column;gap:4px;transition:background .15s}
.boat-drop.over{background:var(--accent-light)}
.chip{padding:7px 10px;border-radius:6px;font-size:12px;font-weight:500;user-select:none;touch-action:none;border:1px solid var(--border);cursor:grab;transition:opacity .15s,transform .15s;-webkit-tap-highlight-color:transparent}
.chip.is-dragging{opacity:0.25;transform:scale(0.95)}
.pool-chip{background:var(--accent-light);border-color:#b5c8e0}
.boat-chip{background:var(--paper2)}
.chip-name{display:block;line-height:1.3}
.chip-by{font-size:10px;font-weight:400;color:var(--muted);margin-top:2px;font-style:italic;display:flex;align-items:center;gap:3px}
.by-dot{display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0}
.empty-hint{font-size:11px;color:#ccc;font-style:italic;padding:6px 4px;width:100%;text-align:center}
.ghost{position:fixed;pointer-events:none;z-index:9999;padding:8px 12px;border-radius:7px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;background:#fff;border:2px solid var(--accent);color:var(--ink);box-shadow:0 6px 20px rgba(0,0,0,0.18);white-space:nowrap;display:none;transform:translate(-50%,-50%)}
.changelog-toggle{margin:14px 0 0;font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline}
.changelog{display:none;margin-top:8px;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.changelog.open{display:block}
.cl-head{padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.cl-list{max-height:200px;overflow-y:auto}
.log-row{padding:7px 12px;border-bottom:1px solid var(--border);font-size:12px;display:flex;gap:8px;align-items:flex-start}
.log-row:last-child{border-bottom:none}
.log-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.log-text{flex:1;line-height:1.4}
.log-time{font-size:10px;color:var(--muted);white-space:nowrap}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:#fff;font-size:13px;padding:9px 18px;border-radius:8px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:9998;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="identity-screen">
  <h1>Crew Assignment</h1>
  <p>Who are you? Your name will appear on any changes you make.</p>
  <div class="identity-buttons">
    <button class="id-btn" onclick="setUser('nico','#2a4a7f')"><span class="id-avatar" style="background:#2a4a7f">N</span>Nico</button>
    <button class="id-btn" onclick="setUser('silvestre','#6b3a8f')"><span class="id-avatar" style="background:#6b3a8f">S</span>Silvestre</button>
    <button class="id-btn" onclick="setUser('luis','#2d6a3f')"><span class="id-avatar" style="background:#2d6a3f">L</span>Luis Herrera</button>
    <button class="id-btn" onclick="setUser('guest','#8a7060')" style="border-style:dashed"><span class="id-avatar" style="background:#8a7060">?</span>Just viewing</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div>
      <h1>Crew Assignment</h1>
      <p id="topbar-hint">Drag names into each boat</p>
    </div>
    <div class="topbar-right">
      <span class="me-badge" id="me-badge"></span>
      <button class="share-btn" onclick="copyLink()">Share link</button>
    </div>
  </div>
  <div class="content">
    <div class="main-layout">
      <div class="section-box">
        <div class="section-head">
          <span class="section-title">Unassigned</span>
          <span class="section-cnt" id="pool-cnt">0</span>
        </div>
        <div class="drop-zone" id="pool-drop" data-zone="pool"></div>
      </div>
      <div class="boats-grid" id="boats-grid"></div>
    </div>
    <button class="changelog-toggle" onclick="toggleCL()">View change history</button>
    <div class="changelog" id="changelog">
      <div class="cl-head">Change history</div>
      <div class="cl-list" id="cl-list"></div>
    </div>
  </div>
</div>

<div class="ghost" id="ghost"></div>
<div class="toast" id="toast"></div>

<script>
const PEOPLE=["Amanda Mueller","Andres Ybarnegaray","Blas Peralta","Carlos Francisco Fernandez","Cecilia Aversa","Claudio Martinelli","Daniel Marx","Diego Merello","Federico Ferreyra","Gala Binga","German Ranftl","Guillermo Giordano","Javier Montanes","Jean Pierre Fort","Jose Luis Manzano","Juan Manuel Bastos","Luis Herrera","Marcelo Idoyaga","Maria Ines Anchelerguez","Maria Natalia Garcia","Marcelo Rufino","Martin Tempestti","Mateo Micucci","Mauricio Mazzon","Mercedes Demasi","Miguel Sanchez","Nicolas Mallo Huergo","Patricio Pagani","Pedro Mazer","Pilar Marco","Rahim Bapoo","Ricardo Carbajal","Ricardo Romero","Rodolfo Micone","Roma Renom","Ruben Liu","Santiago Durani","Santiago Gomez Barris","Savannah Ryan","Silvestre Schindler","Teresa Jordan","William Dunbar"];
const BOATS=[{id:"b0",name:"Dark Star of London",cap:11},{id:"b1",name:"Amuri",cap:12},{id:"b2",name:"Motor boat A",cap:12},{id:"b3",name:"Motor boat B",cap:12}];
const UCOLOR={nico:"#2a4a7f",silvestre:"#6b3a8f",luis:"#2d6a3f",guest:"#8a7060"};
const ULABEL={nico:"Nico",silvestre:"Silvestre",luis:"Luis Herrera",guest:"Guest"};

let me=null, state=null;

function defaultState(){const s={boats:{},pool:[...PEOPLE],log:[]};BOATS.forEach(b=>s.boats[b.id]=[]);return s;}
function encode(s){return btoa(unescape(encodeURIComponent(JSON.stringify(s))))}
function decode(str){try{return JSON.parse(decodeURIComponent(escape(atob(str))))}catch(e){return null}}
function saveHash(){const p=new URLSearchParams(location.hash.slice(1));p.set("d",encode(state));history.replaceState(null,"","#"+p.toString())}
function loadHash(){const p=new URLSearchParams(location.hash.slice(1));const r=p.get("d");if(r){const d=decode(r);if(d&&d.boats&&d.pool)return d;}return defaultState()}
function bname(id){const b=BOATS.find(x=>x.id===id);return b?b.name:"unassigned"}

function setUser(user,color){
  me=user;
  document.getElementById("identity-screen").style.display="none";
  document.getElementById("app").style.display="flex";
  const b=document.getElementById("me-badge");
  b.textContent=ULABEL[user];b.style.background=color+"22";b.style.borderColor=color+"66";
  if(user==="guest")document.getElementById("topbar-hint").textContent="Viewing only";
  render();
}

// ── DRAG ENGINE (mouse + touch) ──
let dName=null,dFrom=null,dEl=null;
const ghost=document.getElementById("ghost");

function startDrag(name,from,el,cx,cy){
  if(me==="guest")return;
  dName=name;dFrom=from;dEl=el;
  el.classList.add("is-dragging");
  ghost.textContent=name;
  ghost.style.display="block";
  posGhost(cx,cy);
}
function posGhost(cx,cy){ghost.style.left=cx+"px";ghost.style.top=cy+"px"}

function zoneAt(cx,cy){
  ghost.style.display="none";
  const el=document.elementFromPoint(cx,cy);
  ghost.style.display="block";
  if(!el)return null;
  const z=el.closest("[data-zone]");
  return z?z.dataset.zone:null;
}
function highlightZone(zone){
  document.querySelectorAll(".over").forEach(el=>el.classList.remove("over"));
  if(!zone)return;
  const t=document.querySelector(`[data-zone="${zone}"]`);
  if(t)t.classList.add("over");
}
function endDrag(cx,cy){
  if(!dName){cleanup();return;}
  const zone=zoneAt(cx,cy);
  if(zone&&zone!==dFrom)doMove(dName,dFrom,zone);
  cleanup();
}
function cleanup(){
  if(dEl)dEl.classList.remove("is-dragging");
  dName=null;dFrom=null;dEl=null;
  ghost.style.display="none";
  document.querySelectorAll(".over").forEach(el=>el.classList.remove("over"));
}

document.addEventListener("mousemove",e=>{
  if(!dName)return;
  posGhost(e.clientX,e.clientY);
  highlightZone(zoneAt(e.clientX,e.clientY));
});
document.addEventListener("mouseup",e=>{if(dName)endDrag(e.clientX,e.clientY)});
document.addEventListener("touchmove",e=>{
  if(!dName)return;
  e.preventDefault();
  const t=e.touches[0];
  posGhost(t.clientX,t.clientY);
  highlightZone(zoneAt(t.clientX,t.clientY));
},{passive:false});
document.addEventListener("touchend",e=>{
  if(!dName)return;
  const t=e.changedTouches[0];
  endDrag(t.clientX,t.clientY);
});
document.addEventListener("touchcancel",cleanup);

function attach(el,name,from){
  el.addEventListener("mousedown",e=>{if(e.button===0){e.preventDefault();startDrag(name,from,el,e.clientX,e.clientY)}});
  el.addEventListener("touchstart",e=>{e.preventDefault();const t=e.touches[0];startDrag(name,from,el,t.clientX,t.clientY)},{passive:false});
}

function doMove(name,from,to){
  if(from==="pool")state.pool=state.pool.filter(n=>n!==name);
  else state.boats[from]=(state.boats[from]||[]).filter(e=>e.name!==name);
  if(to==="pool")state.pool.push(name);
  else{state.boats[to]=state.boats[to]||[];state.boats[to].push({name,by:me});}
  state.log=state.log||[];
  state.log.push({name,from,to,by:me,time:Date.now()});
  saveHash();render();
  showToast(name+" → "+(to==="pool"?"unassigned":bname(to)));
}

// ── RENDER ──
function render(){renderPool();renderBoats();renderCL()}

function renderPool(){
  const drop=document.getElementById("pool-drop");
  document.getElementById("pool-cnt").textContent=state.pool.length;
  drop.innerHTML="";
  if(state.pool.length===0){drop.innerHTML='<div class="empty-hint">Everyone assigned!</div>';return;}
  state.pool.forEach(name=>{
    const chip=document.createElement("div");
    chip.className="chip pool-chip";chip.dataset.zone="pool";
    chip.innerHTML=`<span class="chip-name">${name}</span>`;
    drop.appendChild(chip);
    attach(chip,name,"pool");
  });
}

function renderBoats(){
  const grid=document.getElementById("boats-grid");grid.innerHTML="";
  BOATS.forEach(b=>{
    const names=state.boats[b.id]||[];
    const capClass=names.length===b.cap?"full":names.length>b.cap?"over":"";
    const boat=document.createElement("div");
    boat.className="boat";
    boat.innerHTML=`<div class="boat-head"><span class="boat-name">${b.name}</span><span class="cap-badge ${capClass}">${names.length}/${b.cap}</span></div><div class="boat-drop" id="bd-${b.id}" data-zone="${b.id}"></div>`;
    grid.appendChild(boat);
    const drop=boat.querySelector(".boat-drop");
    if(names.length===0){drop.innerHTML='<div class="empty-hint">drop here</div>';}
    else names.forEach(entry=>{
      const chip=document.createElement("div");
      chip.className="chip boat-chip";chip.dataset.zone=b.id;
      const bc=UCOLOR[entry.by]||"#8a7060";
      const bl=ULABEL[entry.by]||entry.by;
      const byPart=entry.by?`<span class="chip-by"><span class="by-dot" style="background:${bc}"></span>${bl}</span>`:"";
      chip.innerHTML=`<span class="chip-name">${entry.name}</span>${byPart}`;
      drop.appendChild(chip);
      attach(chip,entry.name,b.id);
    });
  });
}

function renderCL(){
  const list=document.getElementById("cl-list");
  if(!state.log||state.log.length===0){list.innerHTML='<div style="padding:12px;font-size:12px;color:var(--muted);font-style:italic">No changes yet</div>';return;}
  list.innerHTML="";
  [...state.log].reverse().forEach(e=>{
    const div=document.createElement("div");div.className="log-row";
    const c=UCOLOR[e.by]||"#8a7060";const bl=ULABEL[e.by]||e.by;
    const fl=e.from==="pool"?"unassigned":bname(e.from);
    const tl=e.to==="pool"?"unassigned":bname(e.to);
    const ts=new Date(e.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    div.innerHTML=`<span class="log-dot" style="background:${c}"></span><span class="log-text"><b>${e.name}</b>: ${fl} → ${tl} <span style="color:${c}">(${bl})</span></span><span class="log-time">${ts}</span>`;
    list.appendChild(div);
  });
}

function toggleCL(){document.getElementById("changelog").classList.toggle("open")}

function copyLink(){
  saveHash();
  navigator.clipboard.writeText(location.href)
    .then(()=>showToast("Link copied!"))
    .catch(()=>prompt("Copy this link:",location.href));
}
function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2500);
}

state=loadHash();
</script>
</body>
</html>
